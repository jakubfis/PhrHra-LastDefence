<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Last Defence</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game-container">
    <div id="top-bar">
        <button id="pause-btn">⏸️</button>
        <button id="delete-btn">🗑️</button> 
        
        <div id="stats">
            VLNA: <span id="wave">1</span> | ❤️ <span id="lives">5</span> | Skóre: <span id="score">0</span> | Peníze: <span id="money">300</span>
        </div>
        
        <div id="controls">
            <div class="card selected" id="unit1">Voják<br>50 💎</div>
            <div class="card" id="unit2">Věž<br>100 💎</div>
            <div class="card" id="unit3">Zeď<br>20 💎</div>
        </div>
    </div>
    
    <div id="canvas-wrapper">
        <div id="game-title">LAST DEFENCE</div>
        <div id="pause-overlay" class="hidden">
            <div>POZASTAVENO</div>
            <button id="restart-btn">Restartovat</button>
        </div>
        <canvas id="canvas1"></canvas>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
